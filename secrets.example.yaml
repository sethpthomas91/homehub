Good, that's enough to lock in the direction. Here's my recommendation on the API layer, then I'll update the doc.

My recommendation: Direct HA API for now, with a clean abstraction in the dashboard code.

The reason to avoid a custom middleware layer right now is that Home Assistant already has a solid REST API and a WebSocket API — you'd essentially be rewriting something that exists. The risk with going "direct HA" is usually dashboard lock-in, but we can mitigate that by isolating all the data-fetching into a single module in the codebase. When the time comes to swap dashboards, you change one file, not the whole architecture.

Concretely: one api.js file that knows how to talk to HA. Everything else in the dashboard just calls functions from that file. Swap api.js for influxdb-api.js later if needed — nothing else changes.

This gives you portability without the overhead of running and maintaining an extra service on the Pi.

