# Copy this file to secrets.yaml and fill in your real values.
# secrets.yaml is gitignored and must NEVER be committed.

wifi_ssid: "YourWiFiNetworkName"
wifi_password: "YourWiFiPassword"

# HA Long-Lived Access Token — NOT stored here.
# Stored on Pi at /etc/homehub/ha_token (chmod 640, root:sethpthomas91).
# Generate at: http://homehub.local:8123 → Profile → Long-Lived Access Tokens
# setup_sensors.sh prompts for this during first-time setup.
ha_url: "http://homeassistant.local:8123"
