<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeHub</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="fonts.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); font-family: var(--font); }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
    }

    .wordmark {
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text3);
      text-decoration: none;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 44px;
      min-width: 44px;
      padding: 6px 16px;
      background: transparent;
      border: 1px solid var(--surface2);
      border-radius: 20px;
      color: var(--text2);
      font-size: .8rem;
      font-family: var(--font);
      text-decoration: none;
      cursor: pointer;
      transition: background .15s;
    }

    .nav-link:hover { background: var(--surface); }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .loc {
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 20px;
    }

    .temp-row {
      line-height: 1;
    }

    .temp {
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 500;
      color: var(--text);
      letter-spacing: -.03em;
    }

    .unit {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 400;
      color: var(--text3);
      vertical-align: super;
    }

    .cond {
      font-size: 1rem;
      color: var(--text2);
      margin-top: 10px;
    }

    .range {
      font-size: .8rem;
      color: var(--text3);
      margin-top: 6px;
    }

    .footer {
      padding: 20px 24px;
      display: flex;
      justify-content: center;
    }

    .date {
      font-size: .75rem;
      color: var(--text3);
      letter-spacing: .04em;
    }

    .pill-nav {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 16px 24px;
    }

    .pill {
      padding: 7px 20px;
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: 10px;
      color: var(--text2);
      font-size: .8rem;
      font-family: var(--font);
      text-decoration: none;
      cursor: pointer;
    }

    .pill--active {
      background: var(--accent-bg);
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="nav-link" href="/games/">Games</a>
      <a class="nav-link" href="/system.html">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;">
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M17.66 6.34l-1.41 1.41M6.34 17.66l-1.41 1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          System
        </a>
    </div>

    <div class="hero">
      <div class="loc">Jovie's Overlook</div>
      <div class="temp-row">
        <span class="temp" id="temp">--</span><span class="unit">°F</span>
      </div>
      <div class="cond" id="cond">--</div>
      <div class="range" id="range">--</div>
    </div>

    <div class="pill-nav">
      <span class="pill pill--active">Weather</span>
      <a class="pill" href="/house">House</a>
    </div>

    <div class="footer">
      <div class="date" id="clock"></div>
    </div>
  </div>

  <script>
    const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const d = new Date();
      document.getElementById('clock').textContent =
        DAYS[d.getDay()] + ' \u00b7 ' + MONTHS[d.getMonth()] + ' ' + d.getDate() + ' \u00b7 ' +
        pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    function weatherLabel(code) {
      if (code === 0) return 'Clear';
      if (code <= 2) return 'Mostly Clear';
      if (code === 3) return 'Overcast';
      if (code === 45 || code === 48) return 'Foggy';
      if (code >= 51 && code <= 55) return 'Drizzle';
      if (code >= 61 && code <= 65) return 'Rain';
      if (code >= 71 && code <= 75) return 'Snow';
      if (code >= 80 && code <= 82) return 'Showers';
      if (code === 95) return 'Thunderstorm';
      return 'Cloudy';
    }

    async function fetchWeather() {
      try {
        const res = await fetch('/api/weather.json');
        if (!res.ok) throw new Error();
        const data = await res.json();
        const cur = data.current;
        const daily = data.daily;
        document.getElementById('temp').textContent = Math.round(cur.temperature_2m);
        document.getElementById('cond').textContent = weatherLabel(cur.weathercode);
        const hi = Math.round(daily.temperature_2m_max[0]);
        const lo = Math.round(daily.temperature_2m_min[0]);
        document.getElementById('range').textContent = 'High ' + hi + '\u00b0 \u00a0\u00b7\u00a0 Low ' + lo + '\u00b0';
      } catch {
        document.getElementById('temp').textContent = '--';
        document.getElementById('cond').textContent = '--';
        document.getElementById('range').textContent = '--';
      }
    }

    tick();
    setInterval(tick, 1000);
    fetchWeather();
    setInterval(fetchWeather, 15 * 60 * 1000);
  </script>
</body>
</html>
