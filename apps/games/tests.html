<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crossword Tests</title>
  <link rel="stylesheet" href="../dashboard/fonts.css">
  <style>
    :root {
      --bg: #0a0c0f;
      --panel: #111620;
      --border: #243040;
      --accent: #00d4ff;
      --accent3: #39ff14;
      --text: #c8d8e8;
      --dim: #7a9ab0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 400;
      padding: 2rem 1.5rem;
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    #summary {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
      display: inline-block;
    }

    #summary.all-pass {
      color: var(--accent3);
      border-color: var(--accent3);
    }

    #summary.has-fail {
      color: #ff5555;
      border-color: #ff5555;
    }

    ul {
      list-style: none;
    }

    li {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      padding: 0.3rem 0;
      border-bottom: 1px solid #141c24;
      line-height: 1.4;
    }

    li.pass { color: var(--accent3); }
    li.fail { color: #ff5555; }

    footer {
      margin-top: 2.5rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
    }

    footer a {
      color: var(--dim);
      text-decoration: none;
      letter-spacing: 0.1em;
    }

    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

<h1>Crossword Engine Tests</h1>
<div id="summary">Running…</div>
<ul id="results"></ul>

<footer><a href="/">← homehub.local</a></footer>

<script src="puzzles/puzzles.js"></script>
<script src="tests.js"></script>
</body>
</html>
