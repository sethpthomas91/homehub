<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crossword Tests</title>
  <link rel="stylesheet" href="../dashboard/fonts.css">
  <link rel="stylesheet" href="../dashboard/css/tokens.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-weight: 400;
      padding: 2rem 1.5rem;
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    #summary {
      font-family: var(--font);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      padding: 0.6rem 1rem;
      border: 1px solid var(--surface2);
      border-radius: var(--r-sm);
      margin-bottom: 1.5rem;
      display: inline-block;
    }

    #summary.all-pass {
      color: var(--accent);
      border-color: var(--accent);
    }

    #summary.has-fail {
      color: var(--warn);
      border-color: var(--warn);
    }

    ul {
      list-style: none;
    }

    li {
      font-family: var(--font);
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      padding: 0.3rem 0;
      border-bottom: 1px solid var(--surface2);
      line-height: 1.4;
    }

    li.pass { color: var(--accent); }
    li.fail { color: var(--warn); }

    footer {
      margin-top: 2.5rem;
      font-family: var(--font);
      font-size: 0.7rem;
    }

    footer a {
      color: var(--text2);
      text-decoration: none;
      letter-spacing: 0.1em;
    }

    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

<h1>Crossword Engine Tests</h1>
<div id="summary">Running…</div>
<ul id="results"></ul>

<footer><a href="/">← homehub.local</a></footer>

<script src="puzzles/puzzles.js"></script>
<script src="tests.js"></script>
</body>
</html>
