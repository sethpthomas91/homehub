server {
    listen 80;
    server_name homehub.local;

    location /api/ {
        root /var/www/homehub;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        root /var/www/homehub/apps/dashboard;
        index home-hub.html;
        try_files $uri $uri/ =404;
    }

    location /dashboard/ {
        alias /var/www/homehub/apps/dashboard/;
        try_files $uri =404;
    }

    location = /games {
        return 301 /games/;
    }

    location /games/ {
        alias /var/www/homehub/apps/games/;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
