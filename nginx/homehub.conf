server {
    listen 80;
    server_name homehub.local;

    # Use Docker's internal DNS so upstream is resolved at request time,
    # not at nginx startup (avoids "host not found" when api container
    # hasn't registered yet).
    resolver 127.0.0.11 valid=10s;

    location /api/chores {
        set $api http://api:5000;
        proxy_pass $api;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /api/users {
        set $api http://api:5000;
        proxy_pass $api;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /api/ {
        root /var/www/homehub;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        root /var/www/homehub/apps/dashboard;
        index home-hub.html;
        try_files $uri $uri/ =404;
    }

    location /dashboard/ {
        alias /var/www/homehub/apps/dashboard/;
        try_files $uri =404;
    }

    location = /games {
        return 301 /games/;
    }

    location /games/ {
        alias /var/www/homehub/apps/games/;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
