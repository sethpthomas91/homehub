server {
    listen 80;
    server_name joviesoverlook.local;

    location / {
        root /var/www/joviesoverlook/apps/dashboard;
        index home-hub.html;
        try_files $uri $uri/ =404;
    }

    location /games {
        alias /var/www/joviesoverlook/apps/games;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
